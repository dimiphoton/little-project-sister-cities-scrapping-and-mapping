name: Sync Wikidata twin cities

on:
  schedule:
    # Chaque dimanche a 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Wikidata (delta)
        env:
          WIKIDATA_CONTACT_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: python scripts/sync_wikidata.py

      - name: Build stats
        run: python scripts/build_stats.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          if git diff --staged --quiet; then
            echo "No data changes detected."
          else
            git commit -m "data: refresh twin cities from Wikidata [skip ci]"
            git push
          fi
