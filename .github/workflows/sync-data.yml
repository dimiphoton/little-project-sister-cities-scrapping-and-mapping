name: Sync Wikidata twin cities

on:
  schedule:
    # Chaque dimanche a 03:00 UTC — delta
    - cron: "0 3 * * 0"
    # Le 1er de chaque mois a 04:00 UTC — full (filet de securite delta)
    - cron: "0 4 1 * *"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Force une synchronisation complete (--full)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Choisir le mode de sync
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_sync }}" = "true" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 4 1 * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=delta" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Wikidata
        env:
          WIKIDATA_CONTACT_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "full" ]; then
            echo "Mode: full sync"
            python scripts/sync_wikidata.py --full
          else
            echo "Mode: delta sync"
            python scripts/sync_wikidata.py
          fi

      - name: Build stats and copy to site
        run: |
          python scripts/build_stats.py
          python scripts/copy_docs_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/ docs/data/
          if git diff --staged --quiet; then
            echo "No data changes detected."
          else
            MODE="${{ steps.mode.outputs.mode }}"
            git commit -m "data: ${MODE} refresh twin cities from Wikidata [skip ci]"
            git push
          fi
